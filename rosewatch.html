<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>잠실 장미상가 모니터링 (비공개)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .glow-card { box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-rose-500 selection:text-white">

    <!-- Header -->
    <header class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-rose-500 to-slate-700 p-2 rounded-xl text-white shadow-lg">
                    <i class="fa-solid fa-lock text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight text-white">잠실 장미상가 모니터링</h1>
                    <p class="text-[10px] text-rose-400 uppercase tracking-widest font-semibold">Private · 비공개 개인 관심 페이지</p>
                </div>
            </div>
            <span class="text-xs text-slate-400 font-mono" id="rose-date">-</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="bg-amber-500/5 border border-amber-500/20 rounded-xl p-4 mb-8 flex items-start gap-3">
            <i class="fa-solid fa-triangle-exclamation text-amber-400 mt-0.5"></i>
            <div>
                <p class="text-xs text-amber-200 font-semibold" id="rose-note">-</p>
                <p class="text-[11px] text-slate-500 mt-1">이 페이지는 hub.html 통합 대시보드 메뉴에 노출되지 않지만, GitHub Pages URL 자체는 링크를 아는 사람이라면 누구나 접근 가능합니다 (검색엔진 색인만 차단됨). 완전히 비공개로 하려면 저장소를 Private로 전환하거나 Pages 접근 제어 설정이 필요합니다.</p>
            </div>
        </div>

        <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6 glow-card">
            <h3 class="font-bold text-lg text-rose-400 flex items-center mb-1">
                <i class="fa-solid fa-store mr-2.5"></i>장미 종합상가 매물 현황
            </h3>
            <p class="text-xs text-slate-400 mb-6">가격 낮은 순 정렬</p>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-xs">
                    <thead>
                        <tr class="border-b border-slate-800 text-[11px] text-slate-500 font-bold uppercase tracking-wider">
                            <th class="py-3 px-3">구분 / 층수</th>
                            <th class="py-3 px-3">전용면적 (㎡)</th>
                            <th class="py-3 px-3 text-rose-400">매매 호가</th>
                            <th class="py-3 px-3 text-right">매물 링크</th>
                        </tr>
                    </thead>
                    <tbody id="rose-shopping-tbody" class="divide-y divide-slate-800/30 font-semibold">
                        <!-- JS Dynamic -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-800/60 py-6 mt-10">
        <p class="text-center text-[11px] text-slate-600">개인 모니터링 전용 페이지</p>
    </footer>

    <script>
        // --- ROSE_WATCH_DATA_START ---
        const marketData = {
            "market_date": "2026년 7월 3일 (금) 기준",
            "note": "네이버부동산 단지코드 확인 후 실거래 자동 연동 예정 (현재는 수동 값 유지)",
            "shops": [
                { "floor": "3층", "size": "14.20㎡", "price": "2억 4,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "지하 1층", "size": "11.50㎡", "price": "2억 5,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "2층", "size": "12.80㎡", "price": "2억 8,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "1층", "size": "10.20㎡", "price": "3억 1,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "지하 1층", "size": "18.40㎡", "price": "3억 4,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "3층", "size": "22.10㎡", "price": "3억 9,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "2층", "size": "19.50㎡", "price": "4억 2,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "1층", "size": "15.30㎡", "price": "4억 8,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "1층", "size": "18.60㎡", "price": "5억 5,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" },
                { "floor": "2층", "size": "28.40㎡", "price": "6억 2,000만원", "link": "https://m.land.naver.com/complex/info/144?tradTpCd=A1" }
            ]
        };
        // --- ROSE_WATCH_DATA_END ---

        function parsePrice(p) {
            const 억 = p.includes('억') ? parseInt(p.split('억')[0]) * 10000 : 0;
            const 만 = p.includes('만원') ? parseInt(p.split('억').pop().replace('만원','').replace(',','').trim() || '0') : 0;
            return 억 + 만;
        }

        function render() {
            document.getElementById('rose-date').innerText = marketData.market_date || '-';
            document.getElementById('rose-note').innerText = marketData.note || '';

            const tbody = document.getElementById('rose-shopping-tbody');
            tbody.innerHTML = '';
            const sorted = [...marketData.shops].sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
            sorted.forEach(item => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-900/30 border-b border-slate-800/20">
                        <td class="py-3 px-3 text-slate-200"><i class="fa-solid fa-store text-rose-400 mr-1.5"></i>장미상가 ${item.floor}</td>
                        <td class="py-3 px-3 font-mono text-slate-400">${item.size}</td>
                        <td class="py-3 px-3 font-mono text-rose-400 font-bold">${item.price}</td>
                        <td class="py-3 px-3 text-right">
                            <a href="${item.link}" target="_blank" class="inline-flex items-center justify-center px-2.5 py-1 rounded bg-slate-800 hover:bg-rose-600 text-[10px] font-bold text-slate-300 hover:text-white transition-all">
                                <i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> 매물 정보 바로가기
                            </a>
                        </td>
                    </tr>
                `;
            });
        }

        window.onload = render;
    </script>
</body>
</html>
