name: Daily KOSPI Dashboard Update

on:
  schedule:
    # UTC 기준 오전 7:00 = 한국 시간(KST) 오후 4:00 (월~금요일 실행)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 직접 버튼을 눌러 수동 강제 수집 및 수동 푸시 가능

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Python Scraper and Update Dashboard
      env:
        # 카카오 연동을 위해 발급받은 평생 Secrets 키셋 매핑 전달
        KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        # 변동 사항이 발생했을 때만 안전하게 저장소에 커밋하여 충돌 방지
        git diff-index --quiet HEAD || git commit -m "⚡️ Auto-Update KOSPI Top 10 Market Data ($(date +'%Y-%m-%d'))"
        git push origin HEAD:${{ github.ref_name }}
