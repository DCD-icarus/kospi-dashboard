name: Scheduled Dashboard Factory

on:
  schedule:
    # 1. 월~금요일 한국시간 오후 4:00 (KOSPI & REITs 동시 수집 -> UTC 오전 7:00)
    - cron: '0 7 * * 1-5'
    # 2. 화~토요일 한국시간 오전 7:00 (미국 주식시장 마감 수집 -> UTC 전날(월~금) 오후 10:00)
    - cron: '0 22 * * 1-5'
    # 3. 매일 한국시간 오전 7:10 (서울 부동산 실거래 정보 수집 -> UTC 전날(월~일) 오후 10:10)
    - cron: '10 22 * * *'
  workflow_dispatch: # 직접 버튼을 눌러 수동 강제 수집 가능

permissions:
  contents: write

jobs:
  run-factory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      # 현재 실행되는 시간대(UTC Hour) 및 분(Minute)을 판별하여 지정된 프로필만 수집 실행합니다.
      - name: Determine Mode and Run Factory Scraper
        env:
          # 카카오 자동 로그인 갱신 키셋 전달
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          HOUR=$(date -u +'%H')
          MIN=$(date -u +'%M')
          
          echo "현재 가상서버 동작 기준 시간(UTC Hour): $HOUR"
          echo "현재 가상서버 동작 기준 분(UTC Minute): $MIN"
          
          if [ "$HOUR" = "07" ]; then
            # 한국 시간 16:00 (오후 4시) -> KOSPI와 리츠를 둘 다 차례대로 수집 갱신합니다.
            echo "-> [오후 4시] 코스피 대시보드 갱신 시작"
            python dashboard_factory.py --mode kospi
            echo "-> [오후 4시] 상장 리츠 대시보드 갱신 시작"
            python dashboard_factory.py --mode reits
          elif [ "$HOUR" = "22" ] && [ "$MIN" = "00" ]; then
            # 한국 시간 07:00 (오전 7시) -> 미국장 마감 시황 수집
            echo "-> [오전 7시] 미국 증시 대시보드 갱신 시작"
            python dashboard_factory.py --mode us_market
          elif [ "$HOUR" = "22" ] && [ "$MIN" = "10" ]; then
            # 한국 시간 07:10 (오전 7시 10분) -> 서울 부동산 시황 수집
            echo "-> [오전 7시 10분] 서울 부동산 대시보드 갱신 시작"
            python dashboard_factory.py --mode seoul_estate
          else
            # 수동으로 버튼을 눌렀을 때는 기본적으로 4개 보드 순차 강제 빌드 진행
            echo "-> [수동 강제 실행] 전체 모드 빌드를 차례대로 진행합니다."
            python dashboard_factory.py --mode kospi
            python dashboard_factory.py --mode reits
            python dashboard_factory.py --mode us_market
            python dashboard_factory.py --mode seoul_estate
          fi

  # STREAMING_CHUNK: Committing updated html files to GitHub repository securely...
  - name: Commit and Push changes safely
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      
      # 파일 매칭 에러 방지를 위해 존재하는 대시보드 파일만 안전하게 추가
      for file in index.html kospi_dashboard.html reits.html us_market.html seoul_estate.html; do
        if [ -f "$file" ]; then
          git add "$file"
        fi
      done
      
      # 변경사항이 실제로 존재할 때만 자동 커밋 및 명시적 HEAD 브랜치 푸시 진행
      if ! git diff --cached --quiet; then
        git commit -m "⚡️ Factory Auto-Update Dashboard Database ($(date +'%Y-%m-%d %H:%M:%S'))"
        git push origin HEAD:${{ github.ref_name }}
      else
        echo "업데이트된 금융/부동산 데이터 변동사항이 없습니다."
      fi
