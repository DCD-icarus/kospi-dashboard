name: Daily KOSPI Dashboard Update

on:
  schedule:
    # UTC 기준 오전 7:00 = 한국 시간(KST) 오후 4:00 (월~금요일 실행)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 직접 버튼을 눌러 수동 실행도 가능하게 설정

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 최신 버전으로 업데이트하여 노드 경고 제거

    - name: Set up Python
      uses: actions/setup-python@v5 # 최신 버전으로 업데이트하여 노드 경고 제거
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python Scraper and Update Dashboard
      env:
        # 카카오톡 API 자동 갱신을 위해 깃허브 Secrets 보안값 전달
        KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html # 추적할 대시보드 파일명을 index.html로 통일
        git diff-index --quiet HEAD || git commit -m "⚡️ Auto-Update KOSPI Market Data ($(date +'%Y-%m-%d'))"
        git push
