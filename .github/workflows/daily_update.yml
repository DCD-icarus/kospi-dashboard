name: Daily KOSPI Dashboard Update

on:
  schedule:
    # UTC 오전 7:00 = 한국 시간(KST) 오후 4:00 (월~금요일 실행)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 사용자가 직접 버튼을 눌러 수동 실행도 가능하게 설정

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 최신 노드 실행 환경 보장을 위해 v4로 업그레이드

    - name: Set up Python
      uses: actions/setup-python@v5 # 최신 노드 환경 호환성 확보

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Python Scraper and Update Dashboard
      env:
        KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff-index --quiet HEAD || git commit -m "⚡️ Auto-Update KOSPI Market Data ($(date +'%Y-%m-%d'))"
        git push
