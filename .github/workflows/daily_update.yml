name: Daily KOSPI Dashboard Update

on:
  schedule:
    # 매 평일(월~금) 오후 4시 KST 실행 설정 (KST = UTC + 9시간이므로, UTC 기준 오전 7시 설정)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 사용자가 깃허브 웹 화면에서 직접 "Run workflow" 버튼을 눌러 즉시 수동 실행할 수 있게 하는 단추

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Scraper and Update Dashboard
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python update_dashboard.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add index.html
        # 변경사항이 발생한 경우에만 Git 커밋 및 푸시 실행해 오류 예방
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update KOSPI data: $(date +'%Y-%m-%d')" && git push)
