name: Daily KOSPI Dashboard Update

on:
  schedule:
    # UTC 기준 오전 7:00 = 한국 시간(KST) 오후 4:00 (월~금요일 실행)
    - cron: '0 7 * * 1-5'
  workflow_dispatch: # 직접 버튼을 눌러 수동 실행도 가능하게 설정

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # 최신 실행 엔진 규격 적용 (Node 경고 제거)

    - name: Set up Python
      uses: actions/setup-python@v5 # 최신 Python 인프라 사용
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 # 우회 크롤링에 필요한 핵심 라이브러리 설치

    - name: Run Python Scraper and Update Dashboard
      env:
        # 카카오톡 API 영구 자동 연장을 위해 깃허브 Secrets 보안 정보를 파이썬으로 안전하게 전달
        KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: python update_dashboard.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html # 추적할 대시보드 파일명을 index.html로 통일
        # 변경 사항이 실제로 존재할 때만 안전하게 커밋하여 배포 충돌을 원천 차단
        git diff-index --quiet HEAD || git commit -m "⚡️ Auto-Update KOSPI Market Data ($(date +'%Y-%m-%d'))"
        git push
