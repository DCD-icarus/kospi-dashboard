<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>추천 투자 명저</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .glow-card {
            box-shadow: 0 10px 30px -15px rgba(0, 0, 0, 0.3);
            transition: all 0.25s ease;
        }
        .glow-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px -12px rgba(0, 0, 0, 0.45);
        }
        .book-cover {
            aspect-ratio: 3 / 4.2;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">

    <!-- Header -->
    <header class="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-amber-500 to-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-500/20">
                    <i class="fa-solid fa-book text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">추천 투자 명저</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold">Curated Investment Reading List</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow w-full">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-slate-100">엄선한 재테크 · 투자 필독서</h2>
            <p class="text-sm text-slate-400 mt-1">직접 읽고 도움이 되었던 책들을 소개합니다.</p>
        </div>

        <div id="book-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JS Dynamic -->
        </div>
    </main>

    <footer class="border-t border-slate-800/60 py-6 mt-10">
        <p class="text-center text-[11px] text-slate-600">본 페이지의 도서 구매 링크는 제휴(수수료) 링크를 포함할 수 있습니다.</p>
    </footer>

    <script>
        // ---------------------------------------------------------------
        // 아래 배열에 책을 추가/수정/삭제하면 됩니다. (신규 항목은 맨 위에 추가 권장)
        // buyLink: 나중에 쿠팡파트너스 / 알라딘TTB / 예스24 제휴 링크로 교체하세요.
        // cover: 표지 이미지 URL (알라딘·교보문고 상품페이지에서 이미지 주소 복사 가능)
        //        비워두면 기본 아이콘이 표시됩니다.
        // ---------------------------------------------------------------
        const BOOKS_DATA = [
            {
                title: "[예시] 책 제목을 입력하세요",
                author: "저자명",
                publisher: "출판사 · 출간년도",
                cover: "",
                description: "이 책을 추천하는 이유를 2~3문장으로 적어주세요. 실제 항목으로 교체 전까지는 예시로 표시됩니다.",
                tags: ["예시", "교체필요"],
                buyLink: "#",
            },
            {
                title: "[예시] 두 번째 추천 도서",
                author: "저자명",
                publisher: "출판사 · 출간년도",
                cover: "",
                description: "직접 읽고 느낀 핵심 인사이트나 어떤 독자에게 추천하는지를 적어주면 좋습니다.",
                tags: ["예시", "교체필요"],
                buyLink: "#",
            },
            {
                title: "[예시] 세 번째 추천 도서",
                author: "저자명",
                publisher: "출판사 · 출간년도",
                cover: "",
                description: "구매 링크(buyLink)는 나중에 제휴 링크로 바꾸면 클릭 시 바로 구매 페이지로 연결됩니다.",
                tags: ["예시", "교체필요"],
                buyLink: "#",
            },
        ];

        function render() {
            const grid = document.getElementById('book-grid');
            grid.innerHTML = '';
            BOOKS_DATA.forEach(book => {
                const coverHtml = book.cover
                    ? `<img src="${book.cover}" alt="${book.title}" class="w-full h-full object-cover">`
                    : `<div class="w-full h-full flex items-center justify-center"><i class="fa-solid fa-book-open text-3xl text-slate-700"></i></div>`;
                const tagsHtml = (book.tags || []).map(t =>
                    `<span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/20 font-bold mr-1">${t}</span>`
                ).join('');
                grid.innerHTML += `
                    <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-5 glow-card flex flex-col">
                        <div class="flex gap-4">
                            <div class="book-cover w-20 rounded-lg overflow-hidden border border-slate-800 shrink-0">${coverHtml}</div>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-sm text-slate-100 leading-snug">${book.title}</h3>
                                <p class="text-xs text-slate-400 mt-1">${book.author}</p>
                                <p class="text-[11px] text-slate-500 mt-0.5">${book.publisher}</p>
                                <div class="mt-2">${tagsHtml}</div>
                            </div>
                        </div>
                        <p class="text-xs text-slate-400 leading-relaxed mt-4 flex-grow">${book.description}</p>
                        <a href="${book.buyLink}" target="_blank" class="mt-4 inline-flex items-center justify-center gap-1.5 text-xs font-bold bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg py-2.5 transition-colors">
                            <i class="fa-solid fa-cart-shopping"></i> 구매하러 가기
                        </a>
                    </div>
                `;
            });
        }

        window.onload = render;
    </script>
</body>
</html>
